[package]
name = "iroh-bench"
version = "0.98.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
bytes = "1.11"
hdrhistogram = { version = "7.2", default-features = false }
iroh = { path = "..", default-features = false }
iroh-metrics = { version = "=1.0.0-rc.0", optional = true }
n0-future = "0.3"
n0-error = "=1.0.0-rc.0"
noq = "=1.0.0-rc.0"
rand = "0.10"
rcgen = "0.14"
rustls = { version = "0.23.33", default-features = false }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3.0", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }

[features]
default = ["metrics", "fast-apple-datapath", "tls-ring"]
metrics = ["iroh/metrics", "iroh-metrics"]
local-relay = ["iroh/test-utils"]
# Use private Apple APIs to send multiple packets in a single syscall.
fast-apple-datapath = ["iroh/fast-apple-datapath", "noq/fast-apple-datapath"]
qlog = ["iroh/qlog", "noq/qlog"]
tls-ring = ["rustls/ring", "iroh/tls-ring"]
tls-aws-lc-rs = ["rustls/aws-lc-rs", "iroh/tls-aws-lc-rs"]

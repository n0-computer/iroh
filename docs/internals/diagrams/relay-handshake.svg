<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C7CFF"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ADE80"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F87171"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .arrow { stroke: #7C7CFF; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .arrow-ok { stroke: #4ADE80; stroke-width: 1.5; fill: none; marker-end: url(#arrow-green); }
      .arrow-fail { stroke: #F87171; stroke-width: 1.5; fill: none; marker-end: url(#arrow-red);
                    stroke-dasharray: 4 2; }
      .label { font-size: 14px; font-weight: 600; fill: #E2E2F0; text-anchor: middle; }
      .label-sm { font-size: 11px; fill: #9494A8; }
      .msg { font-size: 12px; fill: #E2E2F0; font-weight: 600; }
      .note { fill: #2a2a4a; stroke: #7C7CFF; stroke-width: 1; stroke-dasharray: 4 2; }
      .note-text { font-size: 12px; fill: #9494F7; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #E2E2F0; }
      .lifeline { stroke: #5454C6; stroke-width: 1; stroke-dasharray: 4 3; }
      .phase { font-size: 11px; fill: #FBBF24; font-weight: 600; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <text x="300" y="35" class="title" text-anchor="middle">Relay Handshake Protocol</text>

  <!-- Lifeline headers -->
  <rect x="100" y="55" width="100" height="30" rx="6" fill="#252542" stroke="#7C7CFF" stroke-width="2"/>
  <text x="150" y="75" class="label">Client</text>
  <rect x="400" y="55" width="100" height="30" rx="6" fill="#252542" stroke="#7C7CFF" stroke-width="2"/>
  <text x="450" y="75" class="label">Relay</text>

  <!-- Lifelines -->
  <line x1="150" y1="85" x2="150" y2="470" class="lifeline"/>
  <line x1="450" y1="85" x2="450" y2="470" class="lifeline"/>

  <!-- WebSocket established -->
  <text x="300" y="110" class="label-sm" text-anchor="middle" style="fill: #5454C6;">WebSocket connection open</text>
  <line x1="150" y1="115" x2="450" y2="115" stroke="#5454C6" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Phase: Fast path -->
  <text x="55" y="148" class="phase">FAST PATH</text>
  <text x="55" y="162" class="label-sm">(saves 1 RTT)</text>

  <!-- Client -> Relay: KeyMaterialClientAuth -->
  <path d="M 155 155 L 445 155" class="arrow"/>
  <text x="300" y="148" class="msg" text-anchor="middle">KeyMaterialClientAuth</text>
  <text x="300" y="170" class="label-sm" text-anchor="middle">public_key + TLS keying material signature</text>

  <!-- Success: Relay -> Client: ServerConfirmsAuth -->
  <path d="M 445 200 L 155 200" class="arrow-ok"/>
  <text x="300" y="193" class="msg" text-anchor="middle" style="fill: #4ADE80;">ServerConfirmsAuth</text>

  <!-- OR separator -->
  <line x1="80" y1="230" x2="520" y2="230" stroke="#5454C6" stroke-width="1" opacity="0.3"/>
  <text x="300" y="248" class="label-sm" text-anchor="middle" style="fill: #FBBF24;">if keying material unavailable or mismatched</text>

  <!-- Phase: Fallback -->
  <text x="55" y="285" class="phase">FALLBACK</text>

  <!-- Relay -> Client: ServerChallenge -->
  <path d="M 445 280 L 155 280" class="arrow"/>
  <text x="300" y="273" class="msg" text-anchor="middle">ServerChallenge</text>
  <text x="300" y="295" class="label-sm" text-anchor="middle">random 16-byte challenge</text>

  <!-- Client -> Relay: ClientAuth -->
  <path d="M 155 330 L 445 330" class="arrow"/>
  <text x="300" y="323" class="msg" text-anchor="middle">ClientAuth</text>
  <text x="300" y="345" class="label-sm" text-anchor="middle">public_key + challenge signature</text>

  <!-- Success -->
  <path d="M 445 380 L 155 380" class="arrow-ok"/>
  <text x="300" y="373" class="msg" text-anchor="middle" style="fill: #4ADE80;">ServerConfirmsAuth</text>

  <!-- OR Failure -->
  <path d="M 445 410 L 155 410" class="arrow-fail"/>
  <text x="300" y="403" class="msg" text-anchor="middle" style="fill: #F87171;">ServerDeniesAuth</text>

  <!-- Ready -->
  <line x1="120" y1="440" x2="480" y2="440" stroke="#4ADE80" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="300" y="458" class="label-sm" text-anchor="middle" style="fill: #4ADE80;">ready to exchange datagrams</text>

  <!-- Annotation -->
  <rect x="60" y="472" width="480" height="36" rx="4" class="note"/>
  <text x="300" y="494" class="note-text" text-anchor="middle">
    Fast path uses RFC 5705 TLS export — unavailable in browsers and broken by some proxies.
  </text>
</svg>

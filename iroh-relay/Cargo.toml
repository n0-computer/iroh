[package]
name = "iroh-relay"
version = "0.98.0"
edition = "2024"
readme = "README.md"
description = "Iroh's relay server and client"
license = "MIT OR Apache-2.0"
authors = ["n0 team"]
repository = "https://github.com/n0-computer/iroh"
keywords = ["networking", "holepunching", "p2p"]
rust-version = "1.89"

[lib]
# We need "cdylib" to actually generate .wasm files when we run with --target=wasm32-unknown-unknown.
# It would be nice if we could make this target-dependent, but we can't (yet): https://github.com/rust-lang/cargo/issues/12260
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
blake3 = "1.8.2"
bytes = "1.11"
data-encoding = "2.6.0"
derive_more = { version = "2.0.1", features = [
    "debug",
    "display",
    "from",
    "try_into",
    "deref",
] }
http = "1"
http-body-util = "0.1.0"
hyper = { version = "1", features = ["server", "client", "http1"] }
hyper-util = "0.1.1"
iroh-base = { version = "0.98.0", path = "../iroh-base", default-features = false, features = ["key", "relay"] }
iroh-dns = { version = "0.98.0", path = "../iroh-dns" }
iroh-metrics = { version = "0.38", default-features = false }
lru = "0.16.3"
n0-error = "0.1.3"
n0-future = "0.3"
num_enum = "0.7"
pin-project = "1"
postcard = { version = "1", default-features = false, features = [
    "alloc",
    "use-std",
    "experimental-derive",
] }
noq = { version = "0.18.0", default-features = false, features = ["rustls"] }
noq-proto = { version = "0.17.0", default-features = false }
rand = "0.10"
reqwest = { version = "0.13", default-features = false, features = ["rustls-no-provider"] }
rustls = { version = "0.23.33", default-features = false }
rustls-platform-verifier = { version = "0.7.0", optional = true }
serde = { version = "1", features = ["derive", "rc"] }
serde_bytes = "0.11.17"
strum = { version = "0.28", features = ["derive"] }
tokio = { version = "1", features = [
    "io-util",
    "macros",
    "sync",
    "rt",
] }
tokio-rustls = { version = "0.26", default-features = false, features = ["logging"] }
tokio-util = { version = "0.7", features = ["io-util", "io", "codec", "rt"] }
tracing = "0.1"
url = { version = "2.5.3", features = ["serde"] }
webpki-roots = "1.0.3"
webpki_types = { package = "rustls-pki-types", version = "1.12" }

# server feature
clap = { version = "4", features = ["derive"], optional = true }
dashmap = { version = "6.1.0", optional = true }
ahash = { version = "0.8.11", optional = true } # minimal version fix
rcgen = { version = "0.14", optional = true }
reloadable-state = { version = "0.1", optional = true }
rustls-cert-reloadable-resolver = { version = "0.7.1", optional = true }
rustls-cert-file-reader = { version = "0.4.2", optional = true }
time = { version = "0.3.37", optional = true }
tokio-rustls-acme = { version = "0.9", optional = true }
tokio-websockets = { version = "0.13", features = ["rustls-bring-your-own-connector", "getrandom", "rand", "server", "sha1_smol"], optional = true } # server-side websocket implementation
simdutf8 = { version = "0.1.5", optional = true } # minimal version fix
sha1 = { version = "=0.11.0-rc.5", optional = true }
toml = { version = "1.0", optional = true }
serde_json = { version = "1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

# non-wasm-in-browser dependencies
[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
hickory-resolver = { version = "0.26.0", features = ["tokio", "system-config"] }
tokio = { version = "1", features = [
    "io-util",
    "macros",
    "sync",
    "rt",
    "net",
    "fs",
    "io-std",
] }
tokio-websockets = { version = "0.13", features = ["rustls-bring-your-own-connector", "getrandom", "rand", "client", "sha1_smol"] }

# wasm-in-browser dependencies
[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
ws_stream_wasm = { version = "0.7.4", default-features = false }
getrandom = { version = "0.4", features = ["wasm_js"] }

[dev-dependencies]
clap = { version = "4", features = ["derive"] }
proptest = "1.11.0"
rand_chacha = "0.10"
tokio = { version = "1", features = [
    "io-util",
    "sync",
    "rt",
    "net",
    "fs",
    "macros",
    "time",
    "test-util",
] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = "1"
n0-tracing-test = "0.3"

# Android-only dev deps. The test ctor calls
# `iroh_dns::install_test_jni_context_stub` so unit tests that construct a
# `DnsResolver` work without a real JVM in scope.
[target.'cfg(target_os = "android")'.dev-dependencies]
ctor = "0.10"

[build-dependencies]
cfg_aliases = "0.2.1"
vergen-gitcl = "1.0.8"

[features]
default = ["metrics", "tls-ring"]
# Enables fetching TLS trust anchors from the operating system
platform-verifier = ["dep:rustls-platform-verifier"]
server = [
    "metrics",
    "tokio/signal",
    "dep:clap",
    "dep:dashmap",
    "dep:ahash",
    "dep:rcgen",
    "dep:reloadable-state",
    "dep:rustls-cert-file-reader",
    "dep:rustls-cert-reloadable-resolver",
    "dep:time",
    "dep:tokio-rustls-acme",
    "dep:tokio-websockets",
    "dep:simdutf8",
    "dep:sha1",
    "dep:toml",
    "dep:serde_json",
    "dep:tracing-subscriber",
    "noq/platform-verifier",
    "noq/runtime-tokio",
    "iroh-metrics/service",
    "tls-ring",
]
metrics = ["iroh-metrics/metrics"]
test-utils = []
tls-ring = [
    "noq/ring",
    "rustls/ring",
    "tokio-rustls/ring",
    "tokio-websockets/ring",
    "hickory-resolver/https-ring",
    "iroh-dns/tls-ring",
]
tls-aws-lc-rs = [
    "noq/aws-lc-rs",
    "rustls/aws-lc-rs",
    "tokio-rustls/aws-lc-rs",
    "tokio-websockets/aws_lc_rs",
    "hickory-resolver/https-aws-lc-rs",
    "iroh-dns/tls-aws-lc-rs",
]

[[bin]]
name = "iroh-relay"
path = "src/main.rs"
required-features = ["server"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "iroh_docsrs"]

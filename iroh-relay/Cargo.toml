[package]
name = "iroh-relay"
version = "1.0.2"
edition = "2024"
readme = "README.md"
description = "Iroh's relay server and client"
license = "MIT OR Apache-2.0"
authors = ["n0 team"]
repository = "https://github.com/n0-computer/iroh"
keywords = ["networking", "holepunching", "p2p"]
rust-version = "1.91"

[lib]
# We need "cdylib" to actually generate .wasm files when we run with --target=wasm32-unknown-unknown.
# It would be nice if we could make this target-dependent, but we can't (yet): https://github.com/rust-lang/cargo/issues/12260
crate-type = ["lib", "cdylib"]

[lints]
workspace = true

[dependencies]
blake3 = "1.8.2"
bytes = "1.11"
data-encoding = "2.6.0"
derive_more = { version = "2.0.1", features = [
    "debug",
    "display",
    "from",
    "try_into",
    "deref",
] }
http = "1"
http-body-util = "0.1.0"
hyper = { version = "1", features = ["server", "client", "http1"] }
hyper-util = "0.1.1"
iroh-base = { version = "1.0.2", path = "../iroh-base", default-features = false, features = ["key", "relay"] }
iroh-dns = { version = "1.0.2", path = "../iroh-dns" }
iroh-metrics = { version = "1.0.1", default-features = false }
lru = "0.18.0"
n0-error = "1.0.0"
n0-future = "0.3"
num_enum = "0.7"
pin-project = "1"
postcard = { version = "1", default-features = false, features = [
    "alloc",
    "use-std",
    "experimental-derive",
] }
noq = { version = "1.0.1", default-features = false, features = ["rustls"] }
noq-proto = { version = "1.0.1", default-features = false }
rand = "0.10"
reqwest = { version = "0.13", default-features = false, features = ["rustls-no-provider"] }
rustls = { version = "0.23.33", default-features = false }
rustls-platform-verifier = { version = "0.7.0", optional = true }
serde = { version = "1", features = ["derive", "rc"] }
serde_bytes = "0.11.17"
strum = { version = "0.28", features = ["derive"] }
tokio = { version = "1", features = [
    "io-util",
    "macros",
    "sync",
    "rt",
] }
tokio-rustls = { version = "0.26", default-features = false, features = ["logging"] }
tokio-util = { version = "0.7", features = ["io-util", "io", "codec", "rt"] }
tracing = "0.1"
url = { version = "2.5.3", features = ["serde"] }
webpki-roots = "1.0.3"
webpki_types = { package = "rustls-pki-types", version = "1.12" }

# server feature
clap = { version = "4", features = ["derive"], optional = true }
dashmap = { version = "6.1.0", optional = true }
rcgen = { version = "0.14", optional = true }
reloadable-state = { version = "0.1", optional = true }
rustls-cert-reloadable-resolver = { version = "0.7.1", optional = true }
rustls-cert-file-reader = { version = "0.4.2", optional = true }
time = { version = "0.3.37", optional = true }
tokio-rustls-acme = { version = "0.9", optional = true }
tokio-websockets = { version = "0.13", features = ["rustls-bring-your-own-connector", "getrandom", "rand", "server", "sha1_smol"], optional = true } # server-side websocket implementation
simdutf8 = { version = "0.1.5", optional = true } # minimal version fix
sha1 = { version = "0.11.0", optional = true }
toml = { version = "1.0", optional = true }
serde_json = { version = "1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

# non-wasm-in-browser dependencies
[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
hickory-resolver = { version = "0.26.0", features = ["tokio", "system-config"] }
# noq needs the tokio runtime for its endpoint I/O; this is not available in the
# browser, so it is only enabled off-wasm (matching the `iroh` crate).
noq = { version = "1.0.1", default-features = false, features = ["runtime-tokio", "rustls"] }
# WebTransport relay transport. Only used off-wasm; the browser has no QUIC
# WebTransport relay client, so `h3-transport` is inert there.
web-transport-proto = { version = "0.6.0", optional = true }
tokio = { version = "1", features = [
    "io-util",
    "macros",
    "sync",
    "rt",
    "net",
    "fs",
    "io-std",
] }
tokio-websockets = { version = "0.13", features = ["rustls-bring-your-own-connector", "getrandom", "rand", "client", "sha1_smol"] }

# wasm-in-browser dependencies
[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
ws_stream_wasm = { version = "0.7.4", default-features = false }
getrandom = { version = "0.4", features = ["wasm_js"] }
# Browser WebTransport relay client. Wraps the browser's native WebTransport
# API; needs `--cfg web_sys_unstable_apis` (set in .cargo/config.toml).
web-transport-wasm = { version = "0.5.8", optional = true }

# Native dev-dependencies. Scoped away from wasm so that heavy native-only crates
# (tokio net/fs -> mio, axum, proptest) are not unified into the wasm test build.
[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dev-dependencies]
clap = { version = "4", features = ["derive"] }
proptest = "1.11.0"
rand_chacha = "0.10"
test-strategy = "0.4.5"
tokio = { version = "1", features = [
    "io-util",
    "sync",
    "rt",
    "net",
    "fs",
    "macros",
    "time",
    "test-util",
] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = "1"
n0-tracing-test = "0.3"
# Used by the embedding integration tests.
axum = { version = "0.8", features = ["ws"] }
# Used by the wasm_relay example to hash the server certificate.
sha2 = "0.10"

# wasm-in-browser test/dev dependencies
[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dev-dependencies]
wasm-bindgen-test = "0.3.62"
wasm-tracing = "2.1.0"
console_error_panic_hook = "0.1"
# Needed by the browser WebTransport integration test (tests/wt_browser.rs),
# which is a separate crate and so cannot see the library's normal dependencies.
iroh-base = { version = "1.0.2", path = "../iroh-base", default-features = false, features = ["key", "relay"] }
data-encoding = "2.6.0"
n0-future = "0.3"

[build-dependencies]
cfg_aliases = "0.2.1"
vergen-gitcl = "9.1"

[features]
default = ["metrics", "tls-ring"]
# Enables fetching TLS trust anchors from the operating system
platform-verifier = ["dep:rustls-platform-verifier"]
server = [
    "metrics",
    "h3-transport",
    "tokio/signal",
    "dep:clap",
    "dep:dashmap",
    "dep:rcgen",
    "dep:reloadable-state",
    "dep:rustls-cert-file-reader",
    "dep:rustls-cert-reloadable-resolver",
    "dep:time",
    "dep:tokio-rustls-acme",
    "dep:tokio-websockets",
    "dep:simdutf8",
    "dep:sha1",
    "dep:toml",
    "dep:serde_json",
    "dep:tracing-subscriber",
    "noq/platform-verifier",
    "noq/runtime-tokio",
    "iroh-metrics/service",
    "tls-ring",
]
metrics = ["iroh-metrics/metrics"]
test-utils = []
h3-transport = ["dep:web-transport-proto", "dep:web-transport-wasm"]
tls-ring = [
    "noq/ring",
    "rustls/ring",
    "tokio-rustls/ring",
    "tokio-websockets/ring",
    "hickory-resolver/https-ring",
    "iroh-dns/tls-ring",
]
tls-aws-lc-rs = [
    "noq/aws-lc-rs",
    "rustls/aws-lc-rs",
    "tokio-rustls/aws-lc-rs",
    "tokio-websockets/aws_lc_rs",
    "hickory-resolver/https-aws-lc-rs",
    "iroh-dns/tls-aws-lc-rs",
]

[[bin]]
name = "iroh-relay"
path = "src/main.rs"
required-features = ["server"]

[[example]]
name = "wasm_relay"
required-features = ["server"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "iroh_docsrs"]

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    # workspace crates
    "iroh_base::*",
    "iroh_dns::*",
    # crates owned by us that will move to 1.0 as well
    "iroh_metrics::*",
    "n0_error::*",
    "noq::*",
    "noq_proto::*",
    # 1.0 crates that we deem fine to be part of the public API
    "bytes::*",
    "http::*",
    "http_body::*",
    "hyper::*",
    "rustls_pki_types::*",
    "serde_core::*",
    "tokio::*",
    "url::*",
    # non-1.0 crates that we decided to accept in the public API
    "rustls::*",
    "tokio_rustls::*",
    "futures_core::stream::Stream",
    "futures_sink::Sink",
]

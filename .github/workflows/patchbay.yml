name: Patchbay Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: patchbay-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  SCCACHE_CACHE_SIZE: "10G"
  IROH_FORCE_STAGING_RELAYS: "1"
  NEXTEST_VERSION: "0.9.132"

jobs:
  patchbay_tests:
    name: Patchbay Tests
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 45
    runs-on: [self-hosted, linux, X64]
    env:
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        continue-on-error: true

      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest@${{ env.NEXTEST_VERSION }}

      - name: Run patchbay tests
        id: tests
        run: cargo nextest run --profile patchbay --release --message-format libtest-json-plus > test-results.jsonl
        env:
          RUST_LOG: ${{ runner.debug && 'TRACE' || 'DEBUG' }}
          NEXTEST_EXPERIMENTAL_LIBTEST_JSON: "1"
          RUSTFLAGS: "--cfg patchbay_tests"

      - name: Push results
        if: always()
        env:
          PATCHBAY_URL: https://frando.gateway.lol
          PATCHBAY_API_KEY: ${{ secrets.PATCHBAY_API_KEY }}
        run: |
          set -euo pipefail
          TESTDIR="$(cargo metadata --format-version=1 --no-deps | jq -r .target_directory)/testdir-current"
          [ ! -d "$TESTDIR" ] && echo "No testdir output, skipping" && exit 0

          cp test-results.jsonl "$TESTDIR/test-results.jsonl"
          jq -n \
            --arg project "${{ github.event.repository.name }}" \
            --arg branch "${{ github.head_ref || github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --argjson pr ${{ github.event.pull_request.number || 'null' }} \
            --arg pr_url "${{ github.event.pull_request.html_url || '' }}" \
            --arg title "${{ github.event.pull_request.title || github.event.head_commit.message || '' }}" \
            --arg outcome "${{ steps.tests.outcome }}" \
            '{$project, $branch, $commit, $pr, $pr_url, $title, test_outcome: $outcome, created_at: (now | todate)}' \
            > "$TESTDIR/run.json"

          RESPONSE=$(tar -czf - -C "$TESTDIR" . | \
            curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $PATCHBAY_API_KEY" \
              -H "Content-Type: application/gzip" \
              --data-binary @- "$PATCHBAY_URL/api/push/${{ github.event.repository.name }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          [ "$HTTP_CODE" != "200" ] && echo "Push failed ($HTTP_CODE): $BODY" && exit 1

          VIEW_URL=$(echo "$BODY" | jq -r '.view_url // empty')
          echo "PATCHBAY_VIEW_URL=$VIEW_URL" >> "$GITHUB_ENV"

      - name: Comment on PR
        if: always() && env.PATCHBAY_VIEW_URL
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          STATUS="${{ steps.tests.outcome }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MARKER="<!-- patchbay-results -->"
          printf -v BODY '%s\n%s\n%s' \
            "$MARKER" \
            "$ICON **patchbay:** $STATUS | $PATCHBAY_VIEW_URL" \
            "<sub>$(date -u '+%Y-%m-%d %H:%M:%S UTC') · [\`${SHA:0:7}\`](${{ github.server_url }}/$GH_REPO/commit/$SHA)</sub>"

          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --state open --json number -q '.[0].number')
          fi
          [ -z "$PR_NUMBER" ] && echo "No PR found, skipping comment" && exit 0

          EXISTING=$(gh api --paginate "repos/$GH_REPO/issues/$PR_NUMBER/comments" --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/$GH_REPO/issues/comments/$EXISTING" -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi

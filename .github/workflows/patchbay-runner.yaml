name: patchbay-runner

on:
  push:
    branches:
      - main
      - Frando/patchbay-tomls  # TODO: remove before merge
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: false
        type: string
        default: ""
      group:
        description: "Which sim group to run: 'all', 'integration', or 'perf'"
        required: false
        type: string
        default: "all"
      patchbay_branch:
        description: "Branch of netsim-rs/patchbay to use"
        required: false
        type: string
        default: "main"

env:
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  patchbay-runner:
    permissions: write-all
    name: Patchbay runner
    timeout-minutes: 60
    runs-on: [self-hosted, linux, X64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch || github.ref }}

    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install patchbay
      run: |
        cargo install --git https://github.com/n0-computer/patchbay \
          --branch ${{ inputs.patchbay_branch || 'main' }} \
          --no-default-features \
          patchbay-runner

    - name: Run integration sims
      id: integration
      if: ${{ inputs.group == 'all' || inputs.group == 'integration' || inputs.group == '' }}
      continue-on-error: true
      run: patchbay run -v .github/sims-patchbay/integration

    - name: Run perf sims
      id: perf
      if: ${{ inputs.group == 'all' || inputs.group == 'perf' || inputs.group == '' }}
      continue-on-error: true
      run: patchbay run -v .github/sims-patchbay/perf

    - name: Generate perf summary
      if: always()
      run: |
        .github/sims-patchbay/perf-summary.sh .patchbay-work/latest >> $GITHUB_STEP_SUMMARY

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      id: upload-results
      with:
        name: patchbay-results-${{ github.sha }}
        path: .patchbay-work/latest/
        retention-days: 7

    - name: Show combined results
      if: always()
      run: |
        if [[ -f .patchbay-work/latest/combined-results.md ]]; then
          cat .patchbay-work/latest/combined-results.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Fail if sims failed
      if: ${{ steps.integration.outcome == 'failure' || steps.perf.outcome == 'failure' }}
      run: |
        echo "One or more simulations failed."
        if [[ -f .patchbay-work/latest/manifest.json ]]; then
          cat .patchbay-work/latest/manifest.json
        fi
        exit 1

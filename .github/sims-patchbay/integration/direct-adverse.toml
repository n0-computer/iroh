# Direct transfer under adverse link conditions.
# Matrix: throttled (4 Mbit/s) and lossy (8 Mbit/s, 1% loss).

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
cond = ["throttled", "lossy"]

[matrix.params.cond]
throttled = { latency = 200, rate = 4000, loss = 0.0 }
lossy     = { latency = 200, rate = 8000, loss = 1.0 }

[sim]
name     = "direct-${matrix.cond}"
topology = "1to1-public"

[[step]]
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = ${matrix.latency}, rate_kbit = ${matrix.rate}, loss_pct = ${matrix.loss} }

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--duration=30",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
  "fetcher.conn_type contains Ip",
]

# 1-to-1 transfer through NAT with relay.
# Matrix: both behind NAT, only fetcher, only provider.
# When only one side is behind NAT, holepunching should succeed (assert direct IP).

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
variant = ["both", "fetcher", "provider"]

[matrix.params.variant]
both     = { topology = "1to1-nat",          expect_direct = false }
fetcher  = { topology = "1to1-nat-fetcher",  expect_direct = true }
provider = { topology = "1to1-nat-provider", expect_direct = true }

[sim]
name     = "1to1-nat-${matrix.variant}"
topology = "${matrix.topology}"

[[step]]
use  = "relay-setup"
vars = { device = "relay" }

[[step]]
use      = "transfer-provider"
id       = "provider"
device   = "provider"
requires = ["relay.ready"]
args     = ["--env", "dev",
            "--relay-url", "https://$NETSIM_IP_relay:3340"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--env", "dev",
          "--duration=20",
          "--relay-url",        "https://$NETSIM_IP_relay:3340",
          "--remote-relay-url", "https://$NETSIM_IP_relay:3340",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "60s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

[[step]]
when   = "${matrix.expect_direct}"
action = "assert"
checks = [
  "fetcher.conn_type contains Ip",
]

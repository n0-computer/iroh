# Both peers behind NAT with 4 Mbit/s throttle and 200ms latency.

[[extends]]
file = "../iroh-defaults.toml"

[sim]
name     = "nat-both-throttled"
topology = "1to1-nat"

[[step]]
use  = "relay-setup"
vars = { device = "relay" }

[[step]]
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = 200, rate_kbit = 4000 }

[[step]]
use      = "transfer-provider"
id       = "provider"
device   = "provider"
requires = ["relay.ready"]
args     = ["--env", "dev",
            "--relay-url", "https://$NETSIM_IP_relay:3340"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--env", "dev",
          "--duration=30",
          "--relay-url",        "https://$NETSIM_IP_relay:3340",
          "--remote-relay-url", "https://$NETSIM_IP_relay:3340",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

# Relay+DNS transfer with 1% packet loss, 8 Mbit/s, 200ms latency.

[[extends]]
file = "../iroh-defaults.toml"

[sim]
name     = "relay-dns-lossy"
topology = "1to1-relay-dns"

[[step]]
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = 200, rate_kbit = 8000, loss_pct = 1.0 }

[[step]]
use  = "relay-setup"
vars = { device = "relay" }

[[step]]
use  = "dns-setup"
vars = { device = "dns" }

[[step]]
use      = "transfer-provider"
id       = "provider"
device   = "provider"
requires = ["relay.ready", "dns.ready"]
args     = ["--env", "dev",
            "--relay-url", "https://$NETSIM_IP_relay:3340",
            "--pkarr-relay-url", "http://$NETSIM_IP_dns:8080/pkarr",
            "--dns-origin-domain", "$NETSIM_IP_dns:5300"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--env", "dev",
          "--duration=30",
          "--relay-url",        "https://$NETSIM_IP_relay:3340",
          "--remote-relay-url", "https://$NETSIM_IP_relay:3340",
          "--pkarr-relay-url",  "http://$NETSIM_IP_dns:8080/pkarr",
          "--dns-origin-domain", "$NETSIM_IP_dns:5300",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
  "fetcher.conn_type contains Ip",
]

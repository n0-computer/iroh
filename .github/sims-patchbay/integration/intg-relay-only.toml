# Integration test: relay-only transfer.

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
topo = ["1to1", "1to3"]

[sim]
name     = "intg-${matrix.topo}-relay-only"
topology = "${matrix.topo}"

[[step]]
use  = "relay-setup"
vars = { device = "relay" }

[[step]]
use      = "transfer-provider"
id       = "provider"
device   = "provider"
requires = ["relay.ready"]
args     = ["--env", "dev", "--relay-only",
            "--relay-url", "https://$NETSIM_IP_relay:3340"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--env", "dev", "--relay-only",
          "--size=1G",
          "--relay-url",        "https://$NETSIM_IP_relay:3340",
          "--remote-relay-url", "https://$NETSIM_IP_relay:3340"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

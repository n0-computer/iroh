# 1-to-1 transfer through NAT with relay.
# Only provider behind NAT - holepunching should succeed (assert direct IP).

[[extends]]
file = "../iroh-defaults.toml"

[sim]
name     = "1to1-nat-provider"
topology = "1to1-nat-provider"

[[step]]
use  = "relay-setup"
vars = { device = "relay" }

[[step]]
use      = "transfer-provider"
id       = "provider"
device   = "provider"
requires = ["relay.ready"]
args     = ["--env", "dev",
            "--relay-url", "https://$NETSIM_IP_relay:3340"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--env", "dev",
          "--duration=20",
          "--relay-url",        "https://$NETSIM_IP_relay:3340",
          "--remote-relay-url", "https://$NETSIM_IP_relay:3340",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "60s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

[[step]]
action = "assert"
checks = [
  "fetcher.conn_type contains Ip",
]

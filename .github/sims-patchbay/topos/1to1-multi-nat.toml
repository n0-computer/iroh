# Provider behind NAT, fetcher multi-homed behind two NATs
[[router]]
name = "dc"

[[router]]
name = "lan-provider"
nat  = "home"

[[router]]
name = "lan-fetcher-1"
nat  = "home"

[[router]]
name = "lan-fetcher-2"
nat  = "home"

[device.relay.eth0]
gateway = "dc"

[device.provider.eth0]
gateway = "lan-provider"

# Multi-homed fetcher: two interfaces behind different NATs
[device.fetcher.eth0]
gateway = "lan-fetcher-1"
impair  = { latency_ms = 50, rate_kbit = 10000 }

[device.fetcher.eth1]
gateway = "lan-fetcher-2"
impair  = { latency_ms = 50, rate_kbit = 10000 }

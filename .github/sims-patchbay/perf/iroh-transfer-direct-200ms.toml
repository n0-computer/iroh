# Single-provider direct transfers, 200ms latency, 100 Mbit/s, 1G.

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
topo = ["1to1", "1to3", "1to5", "1to10"]

[sim]
name     = "iroh-${matrix.topo}-200ms"
topology = "${matrix.topo}-public"

[[step]]
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = 200, rate_kbit = 100000 }

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--size=1G",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

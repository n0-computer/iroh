# Single-provider direct transfers, no impairment, 1G.

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
topo = ["1to1", "1to3", "1to5", "1to10"]

[sim]
name     = "iroh-${matrix.topo}-baseline"
topology = "${matrix.topo}-public"

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider.endpoint_id}",
          "--size=1G",
          "--remote-direct-address", "${provider.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

# Multi-provider direct transfer, 20ms latency, 100 Mbit/s, 1G, 2to10.
# Fetchers connect round-robin: fetcher-i -> provider-(i % 2).

[[extends]]
file = "../iroh-defaults.toml"

[sim]
name     = "iroh-2to10-20ms"
topology = "2to10-public"

[[step]]
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = 20, rate_kbit = 100000 }

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider-${i % 2}.endpoint_id}",
          "--size=1G",
          "--remote-direct-address", "${provider-${i % 2}.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

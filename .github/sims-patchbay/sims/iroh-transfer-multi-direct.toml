# Matrix sim: multi-provider direct transfers (2 providers, N fetchers).
# Expands to: iroh-{topo}-{cond} for each topo × cond combination.
# Fetchers connect round-robin: fetcher-i → provider-(i % 2).

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
topo = ["2to2", "2to4", "2to6", "2to10"]
cond = ["baseline", "20ms", "200ms", "10g"]

[matrix.params.cond]
baseline = { size = "1G", latency = 0, rate = 0, has_impairment = false }
"20ms"   = { size = "1G", latency = 20, rate = 100000, has_impairment = true }
"200ms"  = { size = "1G", latency = 200, rate = 100000, has_impairment = true }
"10g"    = { size = "10G", latency = 0, rate = 0, has_impairment = false }

[sim]
name     = "iroh-${matrix.topo}-${matrix.cond}"
topology = "${matrix.topo}-public"

[[step]]
when      = "${matrix.has_impairment}"
action    = "set-link-condition"
device    = "fetcher"
condition = { latency_ms = ${matrix.latency}, rate_kbit = ${matrix.rate} }

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider-${i % 2}.endpoint_id}",
          "--size=${matrix.size}",
          "--remote-direct-address", "${provider-${i % 2}.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "120s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
]

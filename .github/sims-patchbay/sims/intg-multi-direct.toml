# Matrix sim: integration tests for multi-provider direct transfers.
# Expands to: intg-{topo}-public for each topology.
# Fetchers connect round-robin: fetcher-i -> provider-(i % 2).

[[extends]]
file = "../iroh-defaults.toml"

[matrix]
topo = ["2to2", "2to4"]

[sim]
name     = "intg-${matrix.topo}-public"
topology = "${matrix.topo}-public"

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

[[step]]
use    = "transfer-fetcher"
id     = "fetcher"
device = "fetcher"
args   = ["${provider-${i % 2}.endpoint_id}",
          "--duration=10",
          "--remote-direct-address", "${provider-${i % 2}.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher"
timeout = "60s"

[[step]]
action = "assert"
checks = [
  "fetcher.size matches [0-9]+",
  "fetcher.conn_type contains Ip",
]

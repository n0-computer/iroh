[[extends]]
file = "../iroh-defaults.toml"

[sim]
name     = "intg-2to4-public"
topology = "2to4-public"

[[step]]
use    = "transfer-provider"
id     = "provider"
device = "provider"

# Round-robin: fetcher-i connects to provider-(i % 2)
[[step]]
use    = "transfer-fetcher"
id     = "fetcher-0"
device = "fetcher-0"
args   = ["${provider-0.endpoint_id}",
          "--duration=10",
          "--remote-direct-address", "${provider-0.direct_addr}"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher-1"
device = "fetcher-1"
args   = ["${provider-1.endpoint_id}",
          "--duration=10",
          "--remote-direct-address", "${provider-1.direct_addr}"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher-2"
device = "fetcher-2"
args   = ["${provider-0.endpoint_id}",
          "--duration=10",
          "--remote-direct-address", "${provider-0.direct_addr}"]

[[step]]
use    = "transfer-fetcher"
id     = "fetcher-3"
device = "fetcher-3"
args   = ["${provider-1.endpoint_id}",
          "--duration=10",
          "--remote-direct-address", "${provider-1.direct_addr}"]

[[step]]
action  = "wait-for"
id      = "fetcher-0"
timeout = "60s"

[[step]]
action  = "wait-for"
id      = "fetcher-1"
timeout = "60s"

[[step]]
action  = "wait-for"
id      = "fetcher-2"
timeout = "60s"

[[step]]
action  = "wait-for"
id      = "fetcher-3"
timeout = "60s"

[[step]]
action = "assert"
checks = [
  "fetcher-0.size matches [0-9]+",
  "fetcher-0.conn_type contains Ip",
  "fetcher-1.size matches [0-9]+",
  "fetcher-1.conn_type contains Ip",
  "fetcher-2.size matches [0-9]+",
  "fetcher-2.conn_type contains Ip",
  "fetcher-3.size matches [0-9]+",
  "fetcher-3.conn_type contains Ip",
]
